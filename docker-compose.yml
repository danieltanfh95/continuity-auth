services:
  datalevin:
    image: huahaiy/datalevin:0.9.22
    container_name: fpl-datalevin
    command: ["server", "-r", "/data", "-p", "8898"]
    ports:
      - "8898:8898"
    volumes:
      - datalevin-data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8898"]
      interval: 5s
      timeout: 2s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fpl-app
    depends_on:
      datalevin:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      FPL_HTTP_HOST: 0.0.0.0
      FPL_HTTP_PORT: 8080
      FPL_DTLV_URI: dtlv://admin:datalevin@datalevin:8898/continuity-auth
      FPL_LOG_LEVEL: info
      FPL_OTEL_ENDPOINT: ""
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 2s
      retries: 5

volumes:
  datalevin-data:
