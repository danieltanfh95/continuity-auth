services:
  datalevin:
    image: huahaiy/datalevin:0.9.22
    platform: linux/amd64
    container_name: cauth-datalevin
    command: ["dtlv", "serv", "-r", "/data", "-p", "8898"]
    ports:
      - "8898:8898"
    volumes:
      - datalevin-data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8898"]
      interval: 5s
      timeout: 2s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cauth-app
    depends_on:
      datalevin:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      CAUTH_HTTP_HOST: 0.0.0.0
      CAUTH_HTTP_PORT: 8080
      # Dev-default credential. Override CAUTH_DTLV_PASSWORD in .env (or your
      # secrets manager) before deploying anywhere a stranger can reach.
      CAUTH_DTLV_URI: dtlv://admin:${CAUTH_DTLV_PASSWORD:-change-me}@datalevin:8898/continuity-auth
      CAUTH_LOG_LEVEL: info
      CAUTH_OTEL_ENDPOINT: ""
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 2s
      retries: 5

volumes:
  datalevin-data:
